<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/jpeg" href="/src/assets/assis-logo.jpg" />
    <link rel="apple-touch-icon" href="/src/assets/assis-logo.jpg" />
    
    <!-- Título otimizado com as principais palavras-chave -->
    <title>Assis Pianos | Afinação, Transporte e Restauração em Fortaleza</title>
    
    <!-- Descrição para o Google -->
    <meta
      name="description"
      content="Especialistas em pianos em Fortaleza: Venda, restauração, conserto, afinação e transporte especializado. Garanta a melhor qualidade para o seu piano."
    />
    
    <!-- Palavras-chave (Keywords) -->
    <meta 
      name="keywords" 
      content="afinação de piano, transporte de piano, conserto de piano, restauração de piano, venda de piano, piano Fortaleza, afinar piano Ceará, Assis Pianos"
    />

    <!-- Open Graph (Para ficar bonito ao compartilhar no WhatsApp, Facebook, etc) -->
    <meta property="og:title" content="Assis Pianos | Afinação, Transporte e Restauração" />
    <meta property="og:description" content="Venda, restauração, conserto, afinação e transporte de pianos em Fortaleza com atendimento especializado." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    
    <!-- Meta tags para o robô do Google saber que deve indexar a página -->
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Assis Pianos" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
